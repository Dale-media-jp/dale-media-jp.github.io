<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#e6dff0"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#4a3268" letter-spacing="6">AI ／ ESSAY</text>
  <line x1="60" y1="125" x2="180" y2="125" stroke="#4a3268" stroke-width="2"/>

  <text x="60" y="240" font-family="'Noto Serif JP', serif" font-size="62" font-weight="900" fill="#2a1d3a">AIに、</text>
  <text x="60" y="320" font-family="'Noto Serif JP', serif" font-size="62" font-weight="900" fill="#4a3268" font-style="italic">「人間らしさって何？」</text>
  <text x="60" y="400" font-family="'Noto Serif JP', serif" font-size="62" font-weight="900" fill="#2a1d3a">と聞いてみた。</text>

  <text x="60" y="470" font-family="'Noto Sans JP', sans-serif" font-size="20" font-weight="500" fill="rgba(42,29,58,0.7)">AIの答えから考える、人間だけが持つもの</text>

  <g transform="translate(820, 200)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="280" height="60" rx="30" fill="#4a3268"/>
      <text x="22" y="38" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="500" fill="#e6dff0">人間らしさって何？</text>
    </g>
    <g transform="translate(0, 90)">
      <rect x="0" y="0" width="280" height="60" rx="30" fill="#ffffff" stroke="#4a3268" stroke-width="1.5"/>
      <text x="22" y="32" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="500" fill="#2a1d3a">感情・共感・有限な命を</text>
      <text x="22" y="50" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="500" fill="#2a1d3a">意識すること、です。</text>
    </g>
    <g transform="translate(0, 180)">
      <text x="0" y="0" font-family="'Noto Serif JP', serif" font-size="13" font-weight="500" fill="rgba(42,29,58,0.55)" font-style="italic">…なんだか、優等生の</text>
      <text x="0" y="22" font-family="'Noto Serif JP', serif" font-size="13" font-weight="500" fill="rgba(42,29,58,0.55)" font-style="italic">作文みたいだな。</text>
    </g>
  </g>

  <text x="60" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#2a1d3a" letter-spacing="4">DALE MEDIA</text>
  <text x="1140" y="600" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="rgba(42,29,58,0.6)" letter-spacing="3" text-anchor="end">小エッセイ ／ AI と私</text>
</svg>
