<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1f13"/>
      <stop offset="100%" stop-color="#162d1c"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(63,163,85,0.08)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <rect x="0" y="0" width="14" height="630" fill="#2d7a3e"/>
  <rect x="60" y="60" width="120" height="3" fill="#3fa355"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif"
        font-size="22" font-weight="600" fill="#3fa355" letter-spacing="4">
    BIZ-AI ／ TECHNOLOGY
  </text>

  <text x="60" y="220" font-family="'Noto Sans JP', sans-serif"
        font-size="56" font-weight="900" fill="#ffffff">
    ボイスクローンAI
  </text>
  <text x="60" y="295" font-family="'Noto Sans JP', sans-serif"
        font-size="56" font-weight="900" fill="#ffffff">
    ビジネス活用ガイド
  </text>

  <text x="60" y="395" font-family="'Noto Sans JP', sans-serif"
        font-size="38" font-weight="700" fill="#3fa355">
    仕組み・倫理・ガバナンス
  </text>

  <text x="60" y="460" font-family="'Noto Sans JP', sans-serif"
        font-size="22" font-weight="500" fill="rgba(255,255,255,0.65)">
    経営者・法務責任者が知るべき導入の判断軸【2026年版】
  </text>

  <line x1="60" y1="555" x2="180" y2="555" stroke="#3fa355" stroke-width="2"/>
  <text x="60" y="585" font-family="Inter, 'Noto Sans JP', sans-serif"
        font-size="18" font-weight="700" fill="#ffffff" letter-spacing="3">
    Dale Media
  </text>

  <g transform="translate(880, 270)">
    <line x1="0" y1="50" x2="20" y2="50" stroke="#3fa355" stroke-width="3"/>
    <line x1="30" y1="20" x2="30" y2="80" stroke="#3fa355" stroke-width="3"/>
    <line x1="50" y1="0" x2="50" y2="100" stroke="#3fa355" stroke-width="3"/>
    <line x1="70" y1="30" x2="70" y2="70" stroke="#3fa355" stroke-width="3"/>
    <line x1="90" y1="10" x2="90" y2="90" stroke="#3fa355" stroke-width="3"/>
    <line x1="110" y1="40" x2="110" y2="60" stroke="#3fa355" stroke-width="3"/>
    <line x1="130" y1="20" x2="130" y2="80" stroke="#3fa355" stroke-width="3"/>
    <line x1="150" y1="0" x2="150" y2="100" stroke="#3fa355" stroke-width="3"/>
    <line x1="170" y1="30" x2="170" y2="70" stroke="#3fa355" stroke-width="3"/>
    <line x1="190" y1="40" x2="190" y2="60" stroke="#3fa355" stroke-width="3"/>
    <line x1="210" y1="20" x2="210" y2="80" stroke="#3fa355" stroke-width="3"/>
    <line x1="230" y1="50" x2="250" y2="50" stroke="#3fa355" stroke-width="3"/>
  </g>
</svg>
