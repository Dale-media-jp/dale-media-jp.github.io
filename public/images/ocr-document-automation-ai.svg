<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#d4a346"/>

  <line x1="60" y1="80" x2="200" y2="80" stroke="#1a1410" stroke-width="3"/>
  <text x="60" y="115" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#1a1410" letter-spacing="6">CASE STUDY ／ BACK OFFICE</text>

  <g transform="translate(60, 200)">
    <g>
      <rect x="0" y="0" width="180" height="240" fill="#f5eede" stroke="#1a1410" stroke-width="2"/>
      <line x1="20" y1="40" x2="160" y2="40" stroke="#1a1410" stroke-width="1.5"/>
      <line x1="20" y1="70" x2="120" y2="70" stroke="rgba(26,20,16,0.5)" stroke-width="1.5"/>
      <line x1="20" y1="100" x2="160" y2="100" stroke="rgba(26,20,16,0.5)" stroke-width="1.5"/>
      <line x1="20" y1="130" x2="140" y2="130" stroke="rgba(26,20,16,0.5)" stroke-width="1.5"/>
      <line x1="20" y1="160" x2="160" y2="160" stroke="rgba(26,20,16,0.5)" stroke-width="1.5"/>
      <line x1="20" y1="190" x2="100" y2="190" stroke="rgba(26,20,16,0.5)" stroke-width="1.5"/>
      <text x="20" y="223" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="rgba(26,20,16,0.45)" letter-spacing="2">PAPER</text>
    </g>

    <g transform="translate(220, 100)">
      <line x1="0" y1="20" x2="80" y2="20" stroke="#1a1410" stroke-width="3"/>
      <polygon points="80,8 100,20 80,32" fill="#1a1410"/>
      <text x="50" y="6" font-family="Inter, sans-serif" font-size="11" font-weight="900" fill="#1a1410" text-anchor="middle" letter-spacing="2">OCR ／ AI</text>
    </g>

    <g transform="translate(340, 0)">
      <rect x="0" y="0" width="220" height="240" fill="#1a1410"/>
      <text x="14" y="36" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#d4a346" letter-spacing="2">STRUCTURED ／ JSON</text>
      <line x1="14" y1="50" x2="206" y2="50" stroke="rgba(212,163,70,0.3)"/>
      <text x="14" y="80" font-family="Inter, sans-serif" font-size="13" fill="#d4a346">{</text>
      <text x="30" y="100" font-family="Inter, sans-serif" font-size="13" fill="#f5eede">"name": "...",</text>
      <text x="30" y="120" font-family="Inter, sans-serif" font-size="13" fill="#f5eede">"date": "...",</text>
      <text x="30" y="140" font-family="Inter, sans-serif" font-size="13" fill="#f5eede">"amount": ...,</text>
      <text x="30" y="160" font-family="Inter, sans-serif" font-size="13" fill="#f5eede">"items": [...]</text>
      <text x="14" y="180" font-family="Inter, sans-serif" font-size="13" fill="#d4a346">}</text>
      <line x1="14" y1="200" x2="206" y2="200" stroke="rgba(212,163,70,0.3)"/>
      <text x="14" y="223" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="rgba(245,238,222,0.7)" letter-spacing="2">ACCURACY 99.5%</text>
    </g>
  </g>

  <text x="700" y="290" font-family="Inter, sans-serif" font-size="180" font-weight="900" fill="#1a1410" letter-spacing="-6">−90<tspan font-size="80">%</tspan></text>
  <text x="700" y="335" font-family="'Noto Sans JP', sans-serif" font-size="20" font-weight="500" fill="rgba(26,20,16,0.7)">書類処理時間</text>

  <text x="700" y="430" font-family="'Noto Serif JP', serif" font-size="34" font-weight="900" fill="#1a1410">OCR×AIで書類処理を自動化</text>

  <text x="60" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="rgba(26,20,16,0.55)" letter-spacing="4">DALE MEDIA</text>
</svg>
