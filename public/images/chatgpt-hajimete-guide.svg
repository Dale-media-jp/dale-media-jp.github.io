<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#fce8e0"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#c45a4a" letter-spacing="6">AI ／ FOR EVERYONE</text>
  <line x1="60" y1="125" x2="180" y2="125" stroke="#c45a4a" stroke-width="2"/>

  <text x="60" y="220" font-family="'Noto Serif JP', serif" font-size="68" font-weight="900" fill="#3a2018">ChatGPTって、</text>
  <text x="60" y="305" font-family="'Noto Serif JP', serif" font-size="68" font-weight="900" fill="#c45a4a">なに？</text>

  <text x="60" y="370" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="500" fill="rgba(58,32,24,0.75)">スマホで、今日からできる AI入門。</text>

  <g transform="translate(60, 430)">
    <rect x="0" y="0" width="320" height="58" rx="29" fill="#ffffff" stroke="#c45a4a" stroke-width="2"/>
    <text x="22" y="38" font-family="'Noto Sans JP', sans-serif" font-size="16" fill="#3a2018">夕食のレシピ、教えて？</text>
  </g>
  <g transform="translate(120, 510)">
    <rect x="0" y="0" width="380" height="58" rx="29" fill="#c45a4a"/>
    <text x="22" y="38" font-family="'Noto Sans JP', sans-serif" font-size="16" fill="#fce8e0">鶏肉と玉ねぎでできますよ。</text>
  </g>

  <g transform="translate(820, 180)">
    <rect x="0" y="0" width="220" height="380" fill="#3a2018" rx="32"/>
    <rect x="14" y="60" width="192" height="280" fill="#fce8e0" rx="6"/>
    <circle cx="110" cy="42" r="4" fill="#3a2018"/>
    <circle cx="110" cy="42" r="6" fill="#fce8e0" opacity="0"/>

    <g transform="translate(28, 80)">
      <rect x="0" y="0" width="120" height="36" rx="18" fill="#c45a4a"/>
      <text x="14" y="24" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="500" fill="#fce8e0">こんにちは！</text>
    </g>
    <g transform="translate(48, 130)">
      <rect x="0" y="0" width="116" height="36" rx="18" fill="#ffffff" stroke="#3a2018" stroke-width="1"/>
      <text x="14" y="24" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="500" fill="#3a2018">なに作ろうかな</text>
    </g>
    <g transform="translate(28, 180)">
      <rect x="0" y="0" width="148" height="50" rx="18" fill="#c45a4a"/>
      <text x="14" y="22" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="500" fill="#fce8e0">お任せください！</text>
      <text x="14" y="40" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="500" fill="#fce8e0">献立を考えますね。</text>
    </g>
    <g transform="translate(28, 250)">
      <rect x="0" y="0" width="160" height="60" rx="6" fill="#fce8e0" stroke="#c45a4a" stroke-width="1"/>
      <text x="14" y="22" font-family="'Noto Sans JP', sans-serif" font-size="10" font-weight="700" fill="#3a2018">今夜の献立</text>
      <line x1="14" y1="30" x2="146" y2="30" stroke="rgba(58,32,24,0.3)"/>
      <text x="14" y="46" font-family="'Noto Sans JP', sans-serif" font-size="9" fill="#3a2018">・親子丼</text>
    </g>
  </g>

  <text x="1140" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#3a2018" letter-spacing="3" text-anchor="end">DALE MEDIA</text>
