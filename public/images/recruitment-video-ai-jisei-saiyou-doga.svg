<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1f13"/>
      <stop offset="100%" stop-color="#162d1c"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(63,163,85,0.08)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <rect x="0" y="0" width="14" height="630" fill="#2d7a3e"/>
  <rect x="60" y="60" width="120" height="3" fill="#3fa355"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif"
        font-size="22" font-weight="600" fill="#3fa355" letter-spacing="4">
    BIZ-AI ／ RECRUITMENT
  </text>

  <text x="60" y="240" font-family="'Noto Sans JP', sans-serif"
        font-size="60" font-weight="900" fill="#ffffff">
    採用動画をAIで
  </text>
  <text x="60" y="320" font-family="'Noto Sans JP', sans-serif"
        font-size="60" font-weight="900" fill="#ffffff">
    内製化する
  </text>

  <text x="60" y="430" font-family="'Noto Sans JP', sans-serif"
        font-size="42" font-weight="700" fill="#3fa355">
    社長メッセージを月10本量産
  </text>

  <text x="60" y="495" font-family="'Noto Sans JP', sans-serif"
        font-size="22" font-weight="500" fill="rgba(255,255,255,0.65)">
    撮影スタジオ不要・原稿作成から配信まで実務フロー
  </text>

  <line x1="60" y1="555" x2="180" y2="555" stroke="#3fa355" stroke-width="2"/>
  <text x="60" y="585" font-family="Inter, 'Noto Sans JP', sans-serif"
        font-size="18" font-weight="700" fill="#ffffff" letter-spacing="3">
    Dale Media
  </text>

  <g transform="translate(880, 215)">
    <circle cx="100" cy="100" r="160" fill="none" stroke="rgba(63,163,85,0.18)" stroke-width="1"/>
    <circle cx="100" cy="100" r="120" fill="none" stroke="rgba(63,163,85,0.28)" stroke-width="1"/>
    <circle cx="100" cy="100" r="80" fill="rgba(45,122,62,0.15)"/>
    <circle cx="100" cy="78" r="22" fill="#3fa355"/>
    <path d="M 60 145 Q 100 110 140 145 L 140 160 L 60 160 Z" fill="#3fa355"/>
  </g>
</svg>
