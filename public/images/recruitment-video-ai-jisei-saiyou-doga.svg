<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#fffdf6"/>
  <rect x="0" y="0" width="1200" height="120" fill="#1a1a1a"/>

  <text x="60" y="68" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#ff8a4c" letter-spacing="6">BUSINESS AI ／ HOWTO</text>
  <text x="1140" y="68" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.55)" letter-spacing="3" text-anchor="end">中小企業 採用 AI内製化</text>

  <text x="60" y="240" font-family="'Noto Serif JP', serif" font-size="74" font-weight="900" fill="#1a1a1a">採用動画は、</text>
  <text x="60" y="335" font-family="'Noto Serif JP', serif" font-size="74" font-weight="900" fill="#ff8a4c">もう外注しない。</text>

  <text x="60" y="395" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="500" fill="rgba(26,26,26,0.7)">社長メッセージを月10本量産する、AI内製化の手順</text>

  <g transform="translate(60, 460)">
    <rect x="0" y="0" width="180" height="120" fill="#1a1a1a" rx="6"/>
    <circle cx="90" cy="60" r="22" fill="none" stroke="#ff8a4c" stroke-width="3"/>
    <polygon points="83,48 83,72 105,60" fill="#ff8a4c"/>
    <text x="14" y="100" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.65)" letter-spacing="2">EP. 01 ／ INTRO</text>

    <rect x="200" y="0" width="180" height="120" fill="#2a2a2a" rx="6"/>
    <circle cx="290" cy="60" r="22" fill="none" stroke="rgba(255,138,76,0.6)" stroke-width="3"/>
    <polygon points="283,48 283,72 305,60" fill="rgba(255,138,76,0.6)"/>
    <text x="214" y="100" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.55)" letter-spacing="2">EP. 02 ／ MISSION</text>

    <rect x="400" y="0" width="180" height="120" fill="#3a3a3a" rx="6"/>
    <circle cx="490" cy="60" r="22" fill="none" stroke="rgba(255,138,76,0.4)" stroke-width="3"/>
    <polygon points="483,48 483,72 505,60" fill="rgba(255,138,76,0.4)"/>
    <text x="414" y="100" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.4)" letter-spacing="2">EP. 03 ／ TEAM</text>
  </g>

  <g transform="translate(800, 230)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="rgba(26,26,26,0.55)" letter-spacing="3">月間アウトプット</text>
    <text x="0" y="120" font-family="Inter, sans-serif" font-size="200" font-weight="900" fill="#1a1a1a">10</text>
    <text x="240" y="120" font-family="'Noto Sans JP', sans-serif" font-size="40" font-weight="700" fill="#1a1a1a">本</text>
    <line x1="0" y1="160" x2="320" y2="160" stroke="#1a1a1a" stroke-width="2"/>
    <text x="0" y="195" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="500" fill="rgba(26,26,26,0.65)">原稿 → AIアバター → 配信</text>
  </g>

  <text x="1140" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1a1a1a" letter-spacing="3" text-anchor="end">DALE MEDIA</text>
</svg>
