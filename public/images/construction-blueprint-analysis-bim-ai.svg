<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#2c2e34"/>
  <defs>
    <pattern id="grid-bp" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(170,196,210,0.12)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid-bp)"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#aac4d2" letter-spacing="6">CASE STUDY ／ CONSTRUCTION ／ BIM</text>

  <g transform="translate(640, 130)" stroke="#aac4d2" fill="none">
    <rect x="0" y="0" width="500" height="380" stroke-width="2"/>
    <line x1="0" y1="80" x2="500" y2="80" stroke-width="1.2"/>
    <line x1="180" y1="0" x2="180" y2="80" stroke-width="1.2"/>
    <line x1="320" y1="0" x2="320" y2="80" stroke-width="1.2"/>
    <line x1="0" y1="200" x2="500" y2="200" stroke-width="1.2"/>
    <line x1="240" y1="80" x2="240" y2="380" stroke-width="1.2"/>
    <line x1="380" y1="200" x2="380" y2="380" stroke-width="1.2"/>
    <line x1="0" y1="300" x2="240" y2="300" stroke-width="1"/>

    <g stroke="#e8a245" stroke-width="2.5" stroke-dasharray="4 4" fill="none">
      <rect x="100" y="120" width="80" height="50"/>
      <circle cx="320" cy="260" r="22"/>
    </g>
    <text x="190" y="148" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#e8a245" letter-spacing="2">DETECTED</text>
    <text x="350" y="266" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#e8a245" letter-spacing="2">CONFLICT</text>

    <text x="14" y="-10" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#aac4d2" letter-spacing="3">BLUEPRINT ／ AUTO ANALYSIS</text>
    <text x="486" y="-10" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="rgba(170,196,210,0.55)" letter-spacing="2" text-anchor="end">SCALE 1:200</text>
  </g>

  <text x="60" y="240" font-family="'Noto Serif JP', serif" font-size="48" font-weight="900" fill="#f0e9da">図面解析AI</text>
  <text x="60" y="298" font-family="'Noto Serif JP', serif" font-size="48" font-weight="900" fill="#aac4d2">×BIM施工管理</text>

  <text x="60" y="400" font-family="Inter, sans-serif" font-size="100" font-weight="900" fill="#e8a245">−50<tspan font-size="50">%</tspan></text>
  <text x="60" y="440" font-family="'Noto Sans JP', sans-serif" font-size="18" font-weight="500" fill="rgba(240,233,218,0.7)">施工計画作成 ／ 手戻り −20%</text>

  <text x="60" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="rgba(240,233,218,0.55)" letter-spacing="4">DALE MEDIA</text>
</svg>
