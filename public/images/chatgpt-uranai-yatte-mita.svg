<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#e8c5b8"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#5a1a2e" letter-spacing="6">AI ／ FOR EVERYONE</text>
  <line x1="60" y1="125" x2="180" y2="125" stroke="#5a1a2e" stroke-width="2"/>

  <text x="60" y="225" font-family="'Noto Serif JP', serif" font-size="58" font-weight="900" fill="#5a1a2e">ChatGPTで</text>
  <text x="60" y="295" font-family="'Noto Serif JP', serif" font-size="58" font-weight="900" fill="#5a1a2e">占いをやってみたら、</text>
  <text x="60" y="375" font-family="'Noto Serif JP', serif" font-size="58" font-weight="900" fill="#c89c3a" font-style="italic">面白いことが起きた。</text>

  <text x="60" y="445" font-family="'Noto Sans JP', sans-serif" font-size="20" font-weight="500" fill="rgba(90,26,46,0.75)">AIに人生相談する前に、知っておきたいこと。</text>

  <g transform="translate(60, 500)" stroke="#5a1a2e" stroke-width="2" fill="none">
