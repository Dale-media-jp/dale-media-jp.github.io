    <text x="30" y="36" font-family="Inter, sans-serif" font-size="12" font-weight="900" fill="#c89c3a" text-anchor="middle">PAST</text>
    <circle cx="30" cy="58" r="10" fill="none" stroke="#c89c3a"/>
    <text x="30" y="78" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#e8c5b8" text-anchor="middle">愚者</text>

    <rect x="80" y="0" width="60" height="90" rx="4" fill="#c89c3a"/>
    <text x="110" y="36" font-family="Inter, sans-serif" font-size="12" font-weight="900" fill="#5a1a2e" text-anchor="middle">NOW</text>
    <path d="M 100 50 L 110 60 L 120 50 L 110 70 Z" fill="#5a1a2e"/>
    <text x="110" y="78" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#5a1a2e" text-anchor="middle">女帝</text>

    <rect x="160" y="0" width="60" height="90" rx="4" fill="#5a1a2e"/>
    <text x="190" y="36" font-family="Inter, sans-serif" font-size="12" font-weight="900" fill="#c89c3a" text-anchor="middle">FUTURE</text>
    <polygon points="186,50 190,42 194,50 198,52 194,58 196,66 190,62 184,66 186,58 182,52" fill="#c89c3a"/>
