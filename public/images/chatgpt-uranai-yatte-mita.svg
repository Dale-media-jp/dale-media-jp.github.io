  </g>

  <g transform="translate(870, 220)">
    <circle cx="100" cy="100" r="100" fill="#5a1a2e"/>
    <circle cx="100" cy="100" r="80" fill="none" stroke="#c89c3a" stroke-width="1" stroke-dasharray="2 4"/>
    <circle cx="100" cy="100" r="60" fill="none" stroke="#c89c3a" stroke-width="1" stroke-dasharray="2 4"/>
    <g fill="#c89c3a">
