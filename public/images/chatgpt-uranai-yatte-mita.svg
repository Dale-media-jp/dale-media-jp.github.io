      <circle cx="100" cy="160" r="3"/>
      <circle cx="40" cy="100" r="3"/>
      <circle cx="142" cy="58" r="2"/>
      <circle cx="142" cy="142" r="2"/>
      <circle cx="58" cy="142" r="2"/>
