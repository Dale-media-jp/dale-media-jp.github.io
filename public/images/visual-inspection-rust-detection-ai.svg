<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#0e0e0e"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#ff5a3c" letter-spacing="6">CASE STUDY ／ MANUFACTURING ／ QC</text>
  <text x="1140" y="105" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.4)" letter-spacing="3" text-anchor="end">2026 . 04</text>

  <g transform="translate(600, 315)">
    <circle cx="0" cy="0" r="220" fill="none" stroke="#2a2a2a" stroke-width="60"/>
    <circle cx="0" cy="0" r="220" fill="none" stroke="#ff5a3c" stroke-width="60" stroke-dasharray="138 1382" stroke-dashoffset="-280" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="160" fill="#0e0e0e"/>
    <text x="0" y="-12" font-family="Inter, sans-serif" font-size="120" font-weight="900" fill="#ffffff" text-anchor="middle">10<tspan font-size="60">%</tspan></text>
    <text x="0" y="40" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ff5a3c" text-anchor="middle" letter-spacing="3">DEFECT RATE</text>
    <text x="0" y="70" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.55)" text-anchor="middle">AIが自動検出</text>
  </g>

  <g transform="translate(60, 250)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="3">KPI ／ 検査時間</text>
    <text x="0" y="50" font-family="Inter, sans-serif" font-size="64" font-weight="900" fill="#ffffff">−70<tspan font-size="32">%</tspan></text>

    <text x="0" y="120" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="3">KPI ／ 見逃し</text>
    <text x="0" y="170" font-family="Inter, sans-serif" font-size="64" font-weight="900" fill="#ffffff">−50<tspan font-size="32">%</tspan></text>
  </g>

  <text x="60" y="540" font-family="'Noto Serif JP', serif" font-size="44" font-weight="900" fill="#ffffff">外観検査AIで</text>
  <text x="60" y="585" font-family="'Noto Serif JP', serif" font-size="32" font-weight="700" fill="rgba(255,255,255,0.55)">錆・汚れ・キズを自動判定</text>

  <text x="1140" y="600" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="4" text-anchor="end">DALE MEDIA</text>
</svg>
