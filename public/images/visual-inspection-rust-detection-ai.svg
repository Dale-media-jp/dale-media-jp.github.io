<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#0e0e0e"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#ff5a3c" letter-spacing="6">CASE STUDY ／ MANUFACTURING ／ QC</text>
  <text x="1140" y="105" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.4)" letter-spacing="3" text-anchor="end">2026 . 04</text>

  <g transform="translate(920, 340)">
    <circle cx="0" cy="0" r="170" fill="none" stroke="#2a2a2a" stroke-width="44"/>
    <circle cx="0" cy="0" r="170" fill="none" stroke="#ff5a3c" stroke-width="44" stroke-dasharray="107 1068" stroke-dashoffset="-260" transform="rotate(-90)"/>
    <text x="0" y="-8" font-family="Inter, sans-serif" font-size="100" font-weight="900" fill="#ffffff" text-anchor="middle">10<tspan font-size="50">%</tspan></text>
    <text x="0" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ff5a3c" text-anchor="middle" letter-spacing="3">DEFECT RATE</text>
    <text x="0" y="58" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.55)" text-anchor="middle">AIが自動検出</text>
  </g>

  <g transform="translate(60, 230)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="3">KPI ／ 検査時間</text>
    <text x="0" y="60" font-family="Inter, sans-serif" font-size="78" font-weight="900" fill="#ffffff">−70<tspan font-size="40">%</tspan></text>

    <text x="0" y="140" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="3">KPI ／ 見逃し</text>
    <text x="0" y="200" font-family="Inter, sans-serif" font-size="78" font-weight="900" fill="#ffffff">−50<tspan font-size="40">%</tspan></text>
  </g>

  <text x="60" y="535" font-family="'Noto Serif JP', serif" font-size="44" font-weight="900" fill="#ffffff">外観検査AIで</text>
  <text x="60" y="585" font-family="'Noto Serif JP', serif" font-size="28" font-weight="700" fill="rgba(255,255,255,0.6)">錆・汚れ・キズを自動判定</text>

  <text x="1140" y="600" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="4" text-anchor="end">DALE MEDIA</text>
</svg>
