    <line x1="36" y1="20" x2="100" y2="20"/>
    <line x1="100" y1="20" x2="100" y2="60"/>
    <line x1="100" y1="60" x2="160" y2="60"/>
    <line x1="100" y1="60" x2="100" y2="100"/>
    <line x1="100" y1="100" x2="160" y2="100"/>
    <line x1="100" y1="60" x2="100" y2="20"/>

