  </text>

  <g transform="translate(880, 215)">
    <rect x="40" y="40" width="60" height="80" rx="6" fill="rgba(63,163,85,0.18)" stroke="#3fa355" stroke-width="1.5"/>
    <rect x="115" y="20" width="60" height="100" rx="6" fill="rgba(63,163,85,0.28)" stroke="#3fa355" stroke-width="1.5"/>
    <rect x="190" y="50" width="60" height="70" rx="6" fill="rgba(63,163,85,0.18)" stroke="#3fa355" stroke-width="1.5"/>
    <rect x="78" y="155" width="135" height="6" fill="#3fa355" opacity="0.6"/>
    <rect x="65" y="175" width="160" height="3" fill="#3fa355" opacity="0.4"/>
    <rect x="80" y="190" width="125" height="3" fill="#3fa355" opacity="0.4"/>
