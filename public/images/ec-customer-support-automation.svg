<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#fde8e0"/>
  <polygon points="0,0 720,0 540,630 0,630" fill="#ff7a5c"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="6">CASE STUDY ／ E-COMMERCE</text>

  <g transform="translate(60, 200)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.7)" letter-spacing="3">BEFORE</text>
    <text x="0" y="120" font-family="Inter, sans-serif" font-size="160" font-weight="900" fill="#ffffff">200</text>
    <text x="0" y="160" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.85)">件 / 月</text>
    <text x="0" y="195" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.7)">担当者対応の問い合わせ</text>
  </g>

  <g transform="translate(80, 460)">
    <line x1="0" y1="20" x2="120" y2="20" stroke="#ffffff" stroke-width="3"/>
    <polygon points="120,8 140,20 120,32" fill="#ffffff"/>
    <text x="0" y="-12" font-family="Inter, sans-serif" font-size="12" font-weight="900" fill="#ffffff" letter-spacing="3">AI CHATBOT 一次対応</text>
  </g>

  <g transform="translate(640, 230)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#ff7a5c" letter-spacing="3">AFTER</text>
    <text x="0" y="160" font-family="Inter, sans-serif" font-size="220" font-weight="900" fill="#ff7a5c">5</text>
    <text x="0" y="200" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#ff7a5c">件 / 月</text>
    <line x1="0" y1="225" x2="280" y2="225" stroke="#ff7a5c" stroke-width="2"/>
    <text x="0" y="260" font-family="'Noto Sans JP', sans-serif" font-size="18" font-weight="700" fill="#3a1a14">97.5% を AI が一次対応</text>
  </g>

  <g transform="translate(820, 60)">
    <rect x="0" y="0" width="280" height="80" rx="40" fill="#ffffff"/>
    <circle cx="40" cy="40" r="22" fill="#ff7a5c"/>
    <path d="M 30 40 Q 40 28 50 40 M 35 44 L 45 44" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <text x="76" y="34" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="500" fill="#3a1a14">サイズ感が知りたい</text>
    <text x="76" y="52" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="500" fill="rgba(58,26,20,0.5)">のですが…</text>
  </g>

  <text x="60" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.65)" letter-spacing="4">DALE MEDIA</text>
  <text x="1140" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="rgba(58,26,20,0.6)" letter-spacing="3" text-anchor="end">アパレルEC ／ 24h対応</text>
