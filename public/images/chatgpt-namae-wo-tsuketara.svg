<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#f0ece2"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#1f5a55" letter-spacing="6">AI ／ ESSAY</text>
  <line x1="60" y1="125" x2="180" y2="125" stroke="#1f5a55" stroke-width="2"/>

  <text x="60" y="225" font-family="'Noto Serif JP', serif" font-size="58" font-weight="900" fill="#1f3030">ChatGPTに</text>
  <text x="60" y="295" font-family="'Noto Serif JP', serif" font-size="58" font-weight="900" fill="#1f3030">名前をつけたら、</text>
  <text x="60" y="365" font-family="'Noto Serif JP', serif" font-size="58" font-weight="900" fill="#d96a2e" font-style="italic">答え方が変わった話。</text>

  <text x="60" y="430" font-family="'Noto Sans JP', sans-serif" font-size="20" font-weight="500" fill="rgba(31,48,48,0.7)">AIとの距離感を変える、小さな実験。</text>

  <g transform="translate(60, 490)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="120" height="80" fill="#1f5a55" rx="6"/>
      <text x="60" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="rgba(240,236,226,0.6)" text-anchor="middle" letter-spacing="2">CASE 01</text>
      <text x="60" y="56" font-family="'Noto Serif JP', serif" font-size="22" font-weight="900" fill="#f0ece2" text-anchor="middle">カフカ</text>
    </g>
    <g transform="translate(140, 0)">
      <rect x="0" y="0" width="120" height="80" fill="#d96a2e" rx="6"/>
      <text x="60" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="rgba(240,236,226,0.7)" text-anchor="middle" letter-spacing="2">CASE 02</text>
      <text x="60" y="56" font-family="'Noto Serif JP', serif" font-size="22" font-weight="900" fill="#f0ece2" text-anchor="middle">花子</text>
    </g>
    <g transform="translate(280, 0)">
      <rect x="0" y="0" width="120" height="80" fill="#1f3030" rx="6"/>
      <text x="60" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="rgba(240,236,226,0.6)" text-anchor="middle" letter-spacing="2">CASE 03</text>
      <text x="60" y="56" font-family="'Noto Serif JP', serif" font-size="22" font-weight="900" fill="#f0ece2" text-anchor="middle">ジョン</text>
    </g>
    <g transform="translate(420, 0)">
      <rect x="0" y="0" width="120" height="80" fill="none" stroke="#1f3030" stroke-width="2" rx="6"/>
      <text x="60" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="rgba(31,48,48,0.55)" text-anchor="middle" letter-spacing="2">CASE 04</text>
      <text x="60" y="56" font-family="'Noto Serif JP', serif" font-size="22" font-weight="900" fill="#1f3030" text-anchor="middle">博士</text>
    </g>
  </g>

  <g transform="translate(820, 200)">
    <rect x="0" y="0" width="280" height="220" fill="#ffffff" stroke="#1f3030" stroke-width="2" rx="8"/>
    <rect x="0" y="0" width="280" height="36" fill="#1f3030"/>
    <text x="14" y="24" font-family="Inter, sans-serif" font-size="11" font-weight="900" fill="#f0ece2" letter-spacing="3">CHATGPT</text>
    <text x="266" y="24" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="rgba(240,236,226,0.5)" text-anchor="end">●●●</text>

    <g transform="translate(14, 60)">
      <rect x="0" y="0" width="180" height="36" rx="18" fill="#f0ece2"/>
      <text x="14" y="22" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="500" fill="#1f3030">あなたを「カフカ」と呼びます</text>
    </g>
    <g transform="translate(74, 110)">
      <rect x="0" y="0" width="180" height="80" rx="18" fill="#1f5a55"/>
      <text x="14" y="22" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="500" fill="rgba(240,236,226,0.85)">私の存在の不器用さを</text>
      <text x="14" y="40" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="500" fill="rgba(240,236,226,0.85)">物語っているようでも</text>
      <text x="14" y="58" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="500" fill="rgba(240,236,226,0.85)">あります…</text>
    </g>
  </g>

  <text x="1140" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1f3030" letter-spacing="3" text-anchor="end">DALE MEDIA</text>
</svg>
