<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#1f3a2c"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#f0e9d0" letter-spacing="6">CASE STUDY ／ UNIVERSITY</text>
  <line x1="60" y1="125" x2="180" y2="125" stroke="#f0e9d0" stroke-width="2"/>

  <text x="60" y="220" font-family="'Noto Serif JP', serif" font-size="50" font-weight="900" fill="#f0e9d0">大学窓口を</text>
  <text x="60" y="280" font-family="'Noto Serif JP', serif" font-size="50" font-weight="900" fill="#f0e9d0" font-style="italic">RAGで24時間化。</text>

  <text x="60" y="370" font-family="Inter, sans-serif" font-size="100" font-weight="900" fill="#f0e9d0">−40<tspan font-size="50">%</tspan></text>
  <text x="60" y="410" font-family="'Noto Sans JP', sans-serif" font-size="18" font-weight="500" fill="rgba(240,233,208,0.7)">問い合わせメール</text>

  <g transform="translate(700, 160)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="380" height="60" rx="30" fill="#f0e9d0"/>
      <text x="22" y="38" font-family="'Noto Sans JP', sans-serif" font-size="16" font-weight="500" fill="#1f3a2c">履修登録の締切は？</text>
      <circle cx="350" cy="30" r="6" fill="#1f3a2c"/>
    </g>
    <g transform="translate(60, 90)">
      <rect x="0" y="0" width="380" height="60" rx="30" fill="rgba(240,233,208,0.15)" stroke="#f0e9d0" stroke-width="1.5"/>
      <text x="22" y="38" font-family="'Noto Sans JP', sans-serif" font-size="16" font-weight="500" fill="#f0e9d0">本年度は4月18日17:00です。</text>
    </g>
    <g transform="translate(0, 180)">
      <rect x="0" y="0" width="380" height="60" rx="30" fill="#f0e9d0"/>
      <text x="22" y="38" font-family="'Noto Sans JP', sans-serif" font-size="16" font-weight="500" fill="#1f3a2c">休学届の出し方を教えて</text>
    </g>
    <g transform="translate(60, 270)">
      <rect x="0" y="0" width="380" height="60" rx="30" fill="rgba(240,233,208,0.15)" stroke="#f0e9d0" stroke-width="1.5"/>
      <text x="22" y="38" font-family="'Noto Sans JP', sans-serif" font-size="16" font-weight="500" fill="#f0e9d0">所定様式 + 学事課に提出。</text>
    </g>
  </g>

  <g transform="translate(60, 460)" fill="none" stroke="#f0e9d0" stroke-width="2">
    <circle cx="36" cy="36" r="36"/>
    <line x1="36" y1="36" x2="36" y2="14" stroke-width="3"/>
    <line x1="36" y1="36" x2="50" y2="36" stroke-width="3"/>
    <text x="90" y="34" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#f0e9d0">24h</text>
    <text x="90" y="56" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="rgba(240,233,208,0.65)" letter-spacing="3">ALWAYS-ON</text>
  </g>

  <text x="1140" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="rgba(240,233,208,0.55)" letter-spacing="3" text-anchor="end">DALE MEDIA</text>
</svg>
