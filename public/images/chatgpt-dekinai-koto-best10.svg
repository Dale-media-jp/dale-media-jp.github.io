<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#e8e2d4"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#2a4a5e" letter-spacing="6">AI ／ FOR EVERYONE</text>
  <line x1="60" y1="125" x2="180" y2="125" stroke="#2a4a5e" stroke-width="2"/>

  <text x="60" y="220" font-family="'Noto Serif JP', serif" font-size="60" font-weight="900" fill="#1f2a33">ChatGPTに、</text>
  <text x="60" y="290" font-family="'Noto Serif JP', serif" font-size="60" font-weight="900" fill="#1f2a33">「できないこと」</text>
  <text x="60" y="385" font-family="Inter, sans-serif" font-size="120" font-weight="900" fill="#2a4a5e" letter-spacing="-4">BEST 10</text>

  <text x="60" y="445" font-family="'Noto Sans JP', sans-serif" font-size="20" font-weight="500" fill="rgba(31,42,51,0.7)">AIの限界を知ると、上手な使い方が見えてくる</text>

  <g transform="translate(60, 500)">
    <text x="0" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="rgba(31,42,51,0.55)" letter-spacing="3">10. 天気予報　 09. 完璧な計算　 08. 記憶　 07. 共感</text>
    <text x="0" y="42" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="rgba(31,42,51,0.55)" letter-spacing="3">06. 写真そっくりの画像　 05. 実際の買い物　 04. 責任を取ること</text>
    <text x="0" y="64" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="rgba(31,42,51,0.55)" letter-spacing="3">03. 考えること　 02. 未来予言　 01. あなたの人生</text>
  </g>

  <g transform="translate(880, 200)">
    <rect x="0" y="0" width="220" height="220" fill="#1f2a33"/>
    <line x1="20" y1="40" x2="200" y2="40" stroke="#2a4a5e" stroke-width="1"/>
    <text x="20" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="900" fill="#e8e2d4" letter-spacing="3">RANKING</text>
    <text x="200" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="rgba(232,226,212,0.5)" letter-spacing="2" text-anchor="end">10 / 10</text>

    <text x="20" y="100" font-family="Inter, sans-serif" font-size="60" font-weight="900" fill="#2a4a5e">No.</text>
    <text x="115" y="100" font-family="Inter, sans-serif" font-size="80" font-weight="900" fill="#e8e2d4">1</text>
    <line x1="20" y1="130" x2="200" y2="130" stroke="rgba(232,226,212,0.3)" stroke-width="1"/>
    <text x="20" y="160" font-family="'Noto Serif JP', serif" font-size="20" font-weight="900" fill="#e8e2d4">あなたの</text>
    <text x="20" y="190" font-family="'Noto Serif JP', serif" font-size="20" font-weight="900" fill="#2a4a5e">人生の代わり</text>
  </g>

  <text x="1140" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1f2a33" letter-spacing="3" text-anchor="end">DALE MEDIA</text>
</svg>
