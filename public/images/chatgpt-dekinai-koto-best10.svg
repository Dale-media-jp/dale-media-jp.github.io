<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#e8e2d4"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#2a4a5e" letter-spacing="6">AI ／ FOR EVERYONE</text>
  <line x1="60" y1="125" x2="180" y2="125" stroke="#2a4a5e" stroke-width="2"/>

  <text x="60" y="220" font-family="'Noto Serif JP', serif" font-size="58" font-weight="900" fill="#1f2a33">ChatGPTに、</text>
  <text x="60" y="290" font-family="'Noto Serif JP', serif" font-size="58" font-weight="900" fill="#1f2a33">「できないこと」</text>
  <text x="60" y="385" font-family="Inter, sans-serif" font-size="100" font-weight="900" fill="#2a4a5e" letter-spacing="-2">BEST 10</text>

  <text x="60" y="440" font-family="'Noto Sans JP', sans-serif" font-size="20" font-weight="500" fill="rgba(31,42,51,0.7)">AIの限界を知ると、上手な使い方が見えてくる</text>

  <g transform="translate(60, 490)">
    <text x="0" y="20" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="500" fill="rgba(31,42,51,0.6)">10. 天気予報　09. 完璧な計算　08. 記憶</text>
    <text x="0" y="44" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="500" fill="rgba(31,42,51,0.6)">07. 共感　06. 写真そっくりの画像　05. 実際の買い物</text>
    <text x="0" y="68" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="500" fill="rgba(31,42,51,0.6)">04. 責任を取ること　03. 考えること　02. 未来予言</text>
  </g>

  <g transform="translate(900, 200)">
    <rect x="0" y="0" width="200" height="220" fill="#1f2a33"/>
    <line x1="20" y1="40" x2="180" y2="40" stroke="#2a4a5e" stroke-width="1"/>
    <text x="20" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="900" fill="#e8e2d4" letter-spacing="3">RANKING</text>
    <text x="180" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="rgba(232,226,212,0.5)" letter-spacing="2" text-anchor="end">10 / 10</text>

    <text x="20" y="100" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#2a4a5e">No.</text>
    <text x="105" y="100" font-family="Inter, sans-serif" font-size="76" font-weight="900" fill="#e8e2d4">1</text>
    <line x1="20" y1="130" x2="180" y2="130" stroke="rgba(232,226,212,0.3)" stroke-width="1"/>
    <text x="20" y="160" font-family="'Noto Serif JP', serif" font-size="18" font-weight="900" fill="#e8e2d4">あなたの</text>
    <text x="20" y="188" font-family="'Noto Serif JP', serif" font-size="18" font-weight="900" fill="#e8c456">人生の代わり</text>
  </g>

  <text x="1140" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1f2a33" letter-spacing="3" text-anchor="end">DALE MEDIA</text>
</svg>
