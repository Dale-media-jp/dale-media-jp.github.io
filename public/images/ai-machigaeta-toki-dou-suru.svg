<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#dceee0"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#d24a3a" letter-spacing="6">AI ／ FOR EVERYONE</text>
  <line x1="60" y1="125" x2="180" y2="125" stroke="#d24a3a" stroke-width="2"/>

  <text x="60" y="225" font-family="'Noto Serif JP', serif" font-size="58" font-weight="900" fill="#1a2a1f">AIが間違えたとき、</text>
  <text x="60" y="305" font-family="'Noto Serif JP', serif" font-size="68" font-weight="900" fill="#d24a3a" font-style="italic">どうしたらいい？</text>

  <text x="60" y="370" font-family="'Noto Sans JP', sans-serif" font-size="20" font-weight="500" fill="rgba(26,42,31,0.7)">ChatGPTの誤情報との、上手な付き合い方。</text>

  <g transform="translate(60, 440)">
    <rect x="0" y="0" width="380" height="120" fill="#1a2a1f" rx="8"/>
    <text x="20" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#dceee0" letter-spacing="3">AI RESPONSE</text>
    <text x="20" y="68" font-family="'Noto Sans JP', sans-serif" font-size="18" font-weight="700" fill="#dceee0">『○○の著者は田中太郎です。</text>
    <text x="20" y="92" font-family="'Noto Sans JP', sans-serif" font-size="18" font-weight="700" fill="#dceee0">2018年に出版されました。』</text>

    <g transform="translate(340, 14)">
      <rect x="0" y="0" width="34" height="34" fill="#d24a3a" rx="3"/>
      <text x="17" y="24" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#dceee0" text-anchor="middle">!</text>
    </g>
  </g>

  <g transform="translate(60, 580)">
    <text x="0" y="0" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#d24a3a">…でも、その本、本当に存在しますか？</text>
  </g>

  <g transform="translate(820, 200)">
    <circle cx="100" cy="100" r="80" fill="#d24a3a"/>
    <text x="100" y="118" font-family="Inter, sans-serif" font-size="80" font-weight="900" fill="#dceee0" text-anchor="middle">?</text>

    <g transform="translate(0, 220)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1a2a1f" letter-spacing="3">CHECKLIST</text>
      <text x="0" y="22" font-family="'Noto Sans JP', sans-serif" font-size="12" font-weight="500" fill="#1a2a1f">✓ 数字は二重チェック</text>
      <text x="0" y="42" font-family="'Noto Sans JP', sans-serif" font-size="12" font-weight="500" fill="#1a2a1f">✓ ソースを聞く</text>
      <text x="0" y="62" font-family="'Noto Sans JP', sans-serif" font-size="12" font-weight="500" fill="#1a2a1f">✓ 専門家に確認</text>
    </g>
  </g>

  <text x="1140" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1a2a1f" letter-spacing="3" text-anchor="end">DALE MEDIA</text>
</svg>
