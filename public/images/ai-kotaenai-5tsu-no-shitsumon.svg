<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#f0e8d0"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#5e6a2e" letter-spacing="6">AI ／ FOR EVERYONE</text>
  <line x1="60" y1="125" x2="180" y2="125" stroke="#5e6a2e" stroke-width="2"/>

  <text x="60" y="225" font-family="'Noto Serif JP', serif" font-size="58" font-weight="900" fill="#2a3018">AIが</text>
  <text x="60" y="295" font-family="'Noto Serif JP', serif" font-size="58" font-weight="900" fill="#c44a2e" font-style="italic">「答えてくれない」</text>
  <text x="60" y="370" font-family="'Noto Serif JP', serif" font-size="58" font-weight="900" fill="#2a3018">5つの質問。</text>

  <text x="60" y="435" font-family="'Noto Sans JP', sans-serif" font-size="20" font-weight="500" fill="rgba(42,48,24,0.7)">ChatGPTの裏側にある、安全装置のはなし。</text>

  <g transform="translate(60, 500)">
    <rect x="0" y="0" width="320" height="80" rx="40" fill="#2a3018"/>
    <text x="22" y="30" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="500" fill="rgba(240,232,208,0.65)">あなた：</text>
    <text x="22" y="55" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#f0e8d0">○○について教えて？</text>
  </g>
  <g transform="translate(120, 590)" opacity="0">
    <rect x="0" y="0" width="320" height="80" rx="40" fill="#c44a2e"/>
  </g>

  <g transform="translate(820, 200)">
    <rect x="0" y="0" width="280" height="220" fill="#5e6a2e"/>
    <rect x="0" y="0" width="280" height="36" fill="#2a3018"/>
    <text x="14" y="24" font-family="Inter, sans-serif" font-size="12" font-weight="900" fill="#f0e8d0" letter-spacing="3">AI RESPONSE</text>
    <text x="266" y="24" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#c44a2e" letter-spacing="2" text-anchor="end">DECLINED</text>

    <g transform="translate(140, 110)">
      <circle cx="0" cy="0" r="34" fill="#c44a2e"/>
      <line x1="-12" y1="-12" x2="12" y2="12" stroke="#f0e8d0" stroke-width="4" stroke-linecap="round"/>
      <line x1="-12" y1="12" x2="12" y2="-12" stroke="#f0e8d0" stroke-width="4" stroke-linecap="round"/>
    </g>

    <text x="140" y="180" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#f0e8d0" text-anchor="middle">申し訳ありません。</text>
    <text x="140" y="200" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="500" fill="rgba(240,232,208,0.75)" text-anchor="middle">お答えできません。</text>
  </g>

  <text x="1140" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#2a3018" letter-spacing="3" text-anchor="end">DALE MEDIA</text>
</svg>
