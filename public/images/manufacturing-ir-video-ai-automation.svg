<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#363a26"/>

  <text x="60" y="105" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#e8d262" letter-spacing="6">CASE STUDY ／ MANUFACTURING ／ IR</text>
  <line x1="60" y1="125" x2="220" y2="125" stroke="#e8d262" stroke-width="2"/>

  <g transform="translate(60, 220)">
    <text x="0" y="60" font-family="Inter, sans-serif" font-size="100" font-weight="900" fill="#f5eede">10</text>
    <text x="160" y="60" font-family="'Noto Sans JP', sans-serif" font-size="50" font-weight="700" fill="#f5eede">時間</text>
    <text x="0" y="100" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="rgba(245,238,222,0.55)" letter-spacing="3">BEFORE</text>

    <g transform="translate(310, 30)">
      <line x1="0" y1="0" x2="100" y2="0" stroke="#e8d262" stroke-width="3"/>
      <polygon points="100,-8 120,0 100,8" fill="#e8d262"/>
    </g>

    <text x="460" y="60" font-family="Inter, sans-serif" font-size="160" font-weight="900" fill="#e8d262">1</text>
    <text x="540" y="60" font-family="'Noto Sans JP', sans-serif" font-size="50" font-weight="700" fill="#e8d262">時間</text>
    <text x="460" y="100" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#e8d262" letter-spacing="3">AFTER ／ −90%</text>
  </g>

  <text x="60" y="450" font-family="'Noto Serif JP', serif" font-size="46" font-weight="900" fill="#f5eede">IR動画制作をAIで内製化</text>
  <text x="60" y="500" font-family="'Noto Sans JP', sans-serif" font-size="20" font-weight="500" fill="rgba(245,238,222,0.7)">研修・eラーニング動画にも応用可能</text>

  <g transform="translate(940, 230)" fill="none" stroke="#e8d262" stroke-width="2">
    <circle cx="0" cy="0" r="100"/>
    <circle cx="0" cy="0" r="70" stroke="rgba(232,210,98,0.45)"/>
    <line x1="0" y1="-100" x2="0" y2="-90"/>
    <line x1="100" y1="0" x2="90" y2="0"/>
    <line x1="0" y1="100" x2="0" y2="90"/>
    <line x1="-100" y1="0" x2="-90" y2="0"/>
    <line x1="0" y1="0" x2="0" y2="-70" stroke-width="3"/>
    <line x1="0" y1="0" x2="42" y2="-42" stroke-width="3"/>
    <circle cx="0" cy="0" r="6" fill="#e8d262" stroke="none"/>
  </g>

  <text x="60" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="rgba(245,238,222,0.5)" letter-spacing="4">DALE MEDIA</text>
  <text x="1140" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="rgba(245,238,222,0.4)" letter-spacing="3" text-anchor="end">社長スタジオ ／ 工数 −90%</text>
</svg>
